name: Integration tests (SQL Server)

# Integration tests against a real SQL Server 2022 via Testcontainers (Docker). Independent of
# the deploy workflow: gives a pass/fail signal but does not gate the Azure deployment. Catches
# behaviour SQLite masks (collation case-insensitivity, LINQ translation) and verifies the real
# migration chain applies to a fresh database.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run SQL Server integration tests
        run: dotnet test tests/Cedeva.Tests.Sql -c Release
