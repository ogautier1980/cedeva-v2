# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cedeva-demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build and Publish
        run: dotnet publish src/Cedeva.Website -c Release -o ./publish

      - name: Run tests
        run: dotnet test tests/Cedeva.Tests -c Release

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4E9FCBF69E6643D0B0AC7CE0A07E4B83 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_ED3D3FB0BE4B462C91A50A77FB7983D8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_93863144889F4BBEB663A80F5DEEBD6D }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply database migrations
        run: |
          dotnet ef database update \
            --project src/Cedeva.Infrastructure \
            --startup-project src/Cedeva.Website \
            --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"

      - name: Deploy to Azure Web App
        run: |
          cd ./publish
          zip -r ../deploy.zip .
          cd ..
          az webapp deploy \
            --resource-group cedeva-rg \
            --name cedeva-demo \
            --src-path deploy.zip \
            --type zip \
            --async false

      - name: Verify deployment (health endpoint)
        run: |
          echo "Probing /health endpoint..."
          HEALTH_URL="https://cedeva-demo-bhf0f0h3c9gtg8ar.francecentral-01.azurewebsites.net/health"
          for i in {1..18}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✓ App is healthy (HTTP 200 on /health)"
              exit 0
            fi
            echo "Attempt $i/18: /health returned $CODE, waiting 10s..."
            sleep 10
          done
          echo "✗ App failed to become healthy within timeout"
          exit 1
