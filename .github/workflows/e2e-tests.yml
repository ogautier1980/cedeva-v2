name: E2E tests (Playwright)

# Browser-level end-to-end tests. Independent of the deploy workflow: it gives a pass/fail
# signal but does not gate the Azure deployment. Uses an in-process Kestrel + SQLite, so no
# database service is needed.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build E2E project
        run: dotnet build tests/Cedeva.Tests.E2E -c Release

      - name: Install Playwright browsers
        run: pwsh tests/Cedeva.Tests.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: dotnet test tests/Cedeva.Tests.E2E -c Release --no-build
